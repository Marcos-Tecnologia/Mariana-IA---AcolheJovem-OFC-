<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aurora</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="container">

    <div id="inicio-container">
      <h1>Aurora</h1>
      <h3>IA de Apoio Social</h3>

      <button id="btn-abrir-chat" type="button">
        Conversar com Aurora
      </button>
    </div>

    <div id="chat-container" class="hidden">
      <div id="creditos">Créditos restantes: 200</div>
      <div id="chat-box"></div>

      <textarea id="user-input" rows="3" placeholder="Digite aqui..."></textarea>

      <button id="btn-enviar" type="button">Enviar</button>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
