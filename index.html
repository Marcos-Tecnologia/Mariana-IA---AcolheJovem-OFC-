<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maxi IA 💻 </title>
  <link rel="stylesheet" href="style.css" />
</head>

<body data-theme="rosa">
  <div id="app">

    <aside id="sidebar">
      <div class="sidebar-top">
        <h2>Maxi IA</h2>
        <p class="sidebar-slogan">Pergunte, descubra, evolua.</p>

        <button id="btn-nova-conversa" type="button">+ Nova conversa</button>
        <button id="btn-excluir-conversa" type="button">Excluir conversa</button>
        <button id="btn-config" type="button">⚙️ Configurações</button>
      </div>

      <div id="conversation-list"></div>
    </aside>

    <main id="main-area">
      <div id="container">

        <div id="inicio-container">
          <div class="intro-glow"></div>
          <h1>Maxi IA</h1>
          <h3>Inteligência que te acompanha todos os dias.</h3>
          <button id="btn-abrir-chat" type="button">Conversar com a Maxi</button>
        </div>

        <div id="chat-container" class="hidden">
          <div id="chat-header">
            <h1 class="chat-title">Maxi IA</h1>
            <p class="chat-subtitle">Pergunte, estude, crie e descubra ✨</p>
          </div>

          <div id="chat-box"></div>

          <textarea
            id="user-input"
            rows="3"
            placeholder="Digite sua pergunta, peça uma imagem ou uma cena animada..."
          ></textarea>

          <button id="btn-enviar" type="button">Enviar</button>
        </div>

      </div>
    </main>
  </div>

  <div id="config-modal" class="modal hidden">
    <div class="modal-content">
      <h2>Configurações</h2>
      <p>Escolha um tema:</p>

      <div class="theme-options">
        <button class="theme-btn" data-theme-choice="rosa">Rosa</button>
        <button class="theme-btn" data-theme-choice="azul">Azul</button>
        <button class="theme-btn" data-theme-choice="branco">Branco</button>
        <button class="theme-btn" data-theme-choice="preto">Preto</button>
      </div>

      <button id="btn-fechar-config" type="button">Fechar</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
