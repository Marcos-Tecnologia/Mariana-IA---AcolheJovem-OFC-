<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aurora - IA de Apoio Social</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">

    <aside id="sidebar">
      <div class="sidebar-top">
        <h2>Aurora</h2>
        <button id="btn-nova-conversa" type="button">+ Nova conversa</button>
        <button id="btn-excluir-conversa" type="button">Excluir conversa</button>
      </div>

      <div id="conversation-list"></div>
    </aside>

    <main id="main-area">
      <div id="container">

        <div id="inicio-container">
          <div class="intro-glow"></div>
          <h1>Aurora</h1>
          <h3>Uma presença calma para conversar com você</h3>
          <button id="btn-abrir-chat" type="button">Conversar com Aurora</button>
        </div>

        <div id="chat-container" class="hidden">
          <div id="chat-header">
            <h1 class="chat-title">Aurora</h1>
            <p class="chat-subtitle">Estou aqui com você 💗</p>
          </div>

          <div id="chat-box"></div>

          <textarea
            id="user-input"
            rows="3"
            placeholder="Escreva o que estiver sentindo..."
          ></textarea>

          <button id="btn-enviar" type="button">Enviar</button>
        </div>

      </div>
    </main>

  </div>

  <script src="script.js"></script>
</body>
</html>
